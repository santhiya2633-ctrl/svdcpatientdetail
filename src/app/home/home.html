<div class="login-container">
  <div class="login-box">
    <h2>Login</h2>

    <form (ngSubmit)="onLogin()">
      
      <div class="input-group">
        <input 
          type="email" 
          [(ngModel)]="email" 
          name="email" 
          placeholder="Enter Email" 
          required
        />
      </div>

      <div class="input-group">
        <input 
          type="password" 
          [(ngModel)]="password" 
          name="password" 
          placeholder="Enter Password" 
          required
        />
      </div>

      <button type="submit">Login</button>
    </form>

    <p class="error">{{ errorMsg }}</p>
  </div>
</div>
