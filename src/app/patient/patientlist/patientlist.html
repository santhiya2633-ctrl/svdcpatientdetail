<mat-card>
    <mat-card-header>
        <div class="header">
            <h1>{{title}}</h1>
            <button (click)="addPatient()" mat-stroked-button="filled" type="button">Add Patient</button>
        </div>
    </mat-card-header>
    <mat-card-content>
        <mat-form-field appearance="outline" style="width: 100%; margin-bottom: 10px;">
  <mat-label>Search Patient</mat-label>
  <input matInput (keyup)="applyFilter($event)" placeholder="Search by name, mobile, etc">
</mat-form-field>
        <table mat-table [dataSource]="datasource">
            <ng-container matColumnDef="patientId">
                <th mat-header-cell *matHeaderCellDef>Patient Id</th>
                <td mat-cell *matCellDef="let element">{{element.patientId}}</td>
            </ng-container>
            <ng-container matColumnDef="patientName">
                <th mat-header-cell *matHeaderCellDef>Patient Name</th>
                <td mat-cell *matCellDef="let element">{{element.patientName}}</td>
            </ng-container>
            <ng-container matColumnDef="gender">
                <th mat-header-cell *matHeaderCellDef>Gender</th>
                <td mat-cell *matCellDef="let element">{{element.gender}}</td>
            </ng-container>
            <ng-container matColumnDef="age">
                <th mat-header-cell *matHeaderCellDef>Age</th>
                <td mat-cell *matCellDef="let element">{{element.age}}</td>
            </ng-container>
            <ng-container matColumnDef="mobileNumber">
                <th mat-header-cell *matHeaderCellDef>Mobile Number</th>
                <td mat-cell *matCellDef="let element">{{element.mobileNumber}}</td>
            </ng-container>
            <ng-container matColumnDef="address">
                <th mat-header-cell *matHeaderCellDef>Address</th>
                <td mat-cell *matCellDef="let element">{{element.address}}</td>
            </ng-container>
            <ng-container matColumnDef="action">
                <th mat-header-cell *matHeaderCellDef >Action</th>
                <td mat-cell *matCellDef="let element">
                    <button (click)="editPatient(element.id)"
                        matButton="outlined"><mat-icon>edit</mat-icon></button>
                    <button (click)="viewPatient(element.id)"
                        matButton="outlined"><mat-icon>visibility</mat-icon></button>
                    <button (click)="deletePatient(element.id)" style="color: red;" matButton="outlined"><mat-icon>delete</mat-icon></button>
                </td>
            </ng-container>
            <tr mat-header-row *matHeaderRowDef="displayColums"></tr>
            <tr mat-row *matRowDef="let row; columns:displayColums"></tr>
        </table>
    </mat-card-content>
    <button mat-raised-button color="primary"
        (click)="downloadExcel(patientList)">
  Download Excel
</button>
</mat-card>
